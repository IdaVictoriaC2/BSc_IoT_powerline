# Den usikre, interne dør (Port 1883) - Bruges af ChirpStack internt
listener 1883 0.0.0.0
allow_anonymous true

# Den topsikrede dør udefra (Port 8883 TLS)
listener 8883 0.0.0.0
cafile /mosquitto/certs/ca.pem
certfile /mosquitto/certs/mqtt-server.pem
keyfile /mosquitto/certs/mqtt-server-key.pem
allow_anonymous true
require_certificate false
tls_version tlsv1.2
